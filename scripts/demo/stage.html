<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>demo stage</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { height: 100vh; display: flex; background: #d9d3e2; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  /* ---- fake browser window (left) ---- */
  #browser { flex: 1; display: flex; flex-direction: column; min-width: 0; margin: 10px; margin-right: 6px; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 28px rgba(28,23,38,.28); background: #fff; }
  #topbar { background: #ece7f2; padding: 8px 10px 0; }
  #lights { display: inline-flex; gap: 7px; margin: 2px 8px 8px 4px; vertical-align: middle; }
  #lights span { width: 12px; height: 12px; border-radius: 50%; }
  #lights .r { background: #ff5f57; } #lights .y { background: #febc2e; } #lights .g { background: #28c840; }
  #tabstrip { display: inline-flex; gap: 4px; vertical-align: bottom; max-width: calc(100% - 90px); overflow: hidden; }
  .tab { display: inline-flex; align-items: center; gap: 7px; max-width: 220px; padding: 7px 14px; border-radius: 9px 9px 0 0; background: #ded7e8; font-size: 12px; color: #4a4356; white-space: nowrap; }
  .tab.active { background: #fff; color: #1c1726; }
  .tab .fav { width: 13px; height: 13px; border-radius: 3px; background: linear-gradient(135deg,#6e2a8c,#c0249e); flex: none; }
  .tab .t { overflow: hidden; text-overflow: ellipsis; }
  #urlrow { background: #fff; padding: 7px 12px; border-bottom: 1px solid #e4dfec; }
  #urlbar { display: flex; align-items: center; gap: 8px; background: #f1edf6; border-radius: 999px; padding: 6px 14px; font-size: 12.5px; color: #40394c; }
  #urlbar .lock { font-size: 11px; }
  #web-frame { flex: 1; border: 0; width: 100%; background: #fff; }
  /* ---- side panel (right) ---- */
  #panel-wrap { width: 424px; flex: none; display: flex; flex-direction: column; margin: 10px 10px 10px 4px; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 28px rgba(28,23,38,.28); background: #fff; }
  #panel-frame { flex: 1; border: 0; width: 100%; }
  body.nopanel #panel-wrap { display: none; }
  body.nopanel #browser { margin-right: 10px; }
</style>
</head>
<body>
  <div id="browser">
    <div id="topbar">
      <span id="lights"><span class="r"></span><span class="y"></span><span class="g"></span></span>
      <span id="tabstrip"></span>
    </div>
    <div id="urlrow"><div id="urlbar"><span class="lock">🔒</span><span id="url"></span></div></div>
    <iframe id="web-frame"></iframe>
  </div>
  <div id="panel-wrap">
    <iframe id="panel-frame"></iframe>
  </div>
  <script src="stage.js"></script>
</body>
</html>
