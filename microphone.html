<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CANAgent — Enable microphone</title>
    <link rel="icon" href="/icons/icon32.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f6f8;
        color: #1b1c1e;
        font: 15px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        max-width: 460px;
        margin: 24px;
        padding: 28px;
        background: #fff;
        border: 1px solid #e3e6ea;
        border-radius: 12px;
        text-align: center;
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #4b5563; margin: 0 0 16px; }
      button {
        font: inherit;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid #2563eb;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      .status { margin-top: 16px; font-weight: 600; min-height: 1.4em; }
      .ok { color: #15803d; }
      .err { color: #b91c1c; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Enable the microphone</h1>
      <p>
        The browser can't show the microphone prompt inside the side panel, so grant access here
        once. Click below and choose <strong>Allow</strong>. After that, voice prompts work in
        CANAgent.
      </p>
      <button id="allow">Allow microphone</button>
      <div id="status" class="status"></div>
    </div>
    <script type="module" src="/src/microphone/microphone.ts"></script>
  </body>
</html>
